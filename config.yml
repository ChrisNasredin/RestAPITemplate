env: "local" # dev, prod, local
http_server:
  address: "localhost:8080"
  timeout: "4s"
  idle_timeout: "60s"
storage:
  host: "127.0.0.1:5432"
  user: "user"
  password: "password"
  dbname: "template"
  sslmode: "disable"
  storage_pool:
    max_conns: 20
    min_conns: 5
    max_conn_lifetime: 30m
    connect_timeout: 20s
